<!doctype html>
<html lang="en">

<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="css/Boostrap/bootstrap.min.css">

    <!-- Style -->
    <link rel="stylesheet" href="css/style.css">

    <title>RNTU Journal Login</title>
</head>

<body>

    <div class="d-lg-flex half">

        <a href="index.html">
            <img src="public/dashboard/logo.png">
        </a>

        <div class="bg order-1 order-md-2" style="background-image: url('public/dashboard/login.jpeg');"></div>
        <div class="contents order-2 order-md-1">

            <div class="container">

                <div class="row align-items-center justify-content-center">

                    <div class="col-md-7">

                        <h3>Login to <strong>RNTU Journal CMS</strong></h3>
                        <p class="mb-4">Sign in to access the Journal Management System and manage journals, articles,
                            peer reviews, volumes, issues, and
                            publications securely.</p>

                        <form action="#" method="post">

                            <div class="form-group first">
                                <label>Email Address</label>
                                <input type="text" class="form-control" placeholder="your-email@gmail.com">
                            </div>

                            <div class="form-group last mb-3">
                                <label>Password</label>
                                <input type="password" class="form-control" placeholder="Your Password">
                            </div>

                            <div class="mb-4 text-center">
                                <a href="#" class="forgot-pass">Forgot Password</a>
                            </div>

                            <a href="index.html" class="btn btn-block">Login</a>

                        </form>
                    </div>

                    <footer class="footer_login">
                        © 2026 Rabindranath Tagore University (RNTU) Journal Management System. All Rights Reserved.
                    </footer>

                </div>



            </div>

        </div>

    </div>

</body>

</html>
